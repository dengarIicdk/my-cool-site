<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICDK // БЕЛОВ ДАНИИЛ</title>
    
    <!-- Шрифты и анимации -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link href="https://unpkg.com" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ff0055;
            --blue: #00f2ff;
            --red: #ff3131;
            --bg: #020205;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Плавное появление всей страницы */
        .fade-in {
            animation: fadeInPage 1s ease-in-out;
        }

        @keyframes fadeInPage {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ШАПКА: ЛОГОТИП И МЕНЮ */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5vh 20px;
            gap: 30px;
        }

        .logo-main img {
            height: 150px; /* Оптимальный размер "на мой вкус" */
            width: auto;
            filter: drop-shadow(0 0 20px var(--red));
            animation: logo-float 4s infinite ease-in-out;
            transition: 0.3s;
        }

        .logo-main img:hover {
            filter: drop-shadow(0 0 35px var(--blue));
            transform: scale(1.05);
        }

        @keyframes logo-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        nav {
            display: flex;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: var(--blue);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 14px;
            transition: 0.3s;
            text-shadow: 0 0 10px var(--blue);
        }

        nav a:hover {
            color: var(--pink);
            text-shadow: 0 0 20px var(--pink);
        }

        /* КОНТЕНТ */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-bottom: 50px;
        }

        .photo-frame {
            width: 180px;
            height: 180px;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            background: var(--blue);
            padding: 3px;
            box-shadow: 0 0 25px var(--blue);
            margin-bottom: 30px;
        }

        .photo-inner {
            width: 100%;
            height: 100%;
            background: #000;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            overflow: hidden;
        }

        .photo-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: clamp(2.5rem, 7vw, 4rem);
            margin: 10px 0;
            letter-spacing: 6px;
            text-shadow: 3px 3px var(--red);
        }

        .status {
            color: var(--pink);
            letter-spacing: 5px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .about-section {
            max-width: 650px;
            font-family: monospace;
            line-height: 1.7;
            color: #888;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            margin: 0 20px;
        }
    </style>
</head>
<body class="fade-in">

    <header>
        <div class="logo-main">
            <!-- Твой крутой логотип теперь здесь -->
            <img src="photos/logo.png" alt="ICDK_LOGO">
        </div>
        <nav>
            <a href="index.html">ЯДРО</a>
            <a href="projects.html">ПРОЕКТЫ</a>
            <a href="contact.html">СВЯЗЬ</a>
        </nav>
    </header>

    <main class="hero">
        <div class="photo-frame" data-aos="zoom-in">
            <div class="photo-inner">
                <img src="photos/me.jpg" alt="Белов Даниил">
            </div>
        </div>

        <h1 data-aos="fade-up">БЕЛОВ ДАНИИЛ</h1>
        <div class="status" data-aos="fade-up" data-aos-delay="200">ICDK // SYSTEM_ACTIVE</div>

        <div class="about-section" data-aos="fade-up" data-aos-delay="400">
            Разработка <b>Software Architecture</b> и <b>UI/UX Design</b>. <br>
            Проектирую защищенные интерфейсы и системы визуализации данных. 
            Специализация: <b>Digital Security</b> и <b>Brutalist Aesthetics</b>.
        </div>
    </main>

    <script src="https://unpkg.com"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
