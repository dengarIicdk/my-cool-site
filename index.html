<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICDK // SYSTEM_CORE_v4.0.1</title>
    
    <!-- ВНЕШНИЕ РЕСУРСЫ -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link href="https://unpkg.com" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ff0055;
            --blue: #00f2ff;
            --red: #ff3131;
            --bg: #020205;
            --panel-bg: rgba(255, 49, 49, 0.03);
            --border: rgba(0, 242, 255, 0.2);
        }

        /* ГЛОБАЛЬНЫЕ СТИЛИ */
        * { cursor: crosshair; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* СИСТЕМНЫЙ ШУМ НА ФОНЕ */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('https://grainy-gradients.vercel.app');
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
        }

        /* HUD ЭЛЕМЕНТЫ ПО УГЛАМ */
        .hud-corner {
            position: fixed;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--blue);
            z-index: 5000;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .top-left { top: 0; left: 0; border-left: 2px solid var(--red); }
        .top-right { top: 0; right: 0; border-right: 2px solid var(--blue); text-align: right; }
        .bottom-left { bottom: 0; left: 0; color: #444; }

        /* HEADER & LOGO */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 4vh;
            z-index: 3000;
        }

        .logo-container {
            position: relative;
            cursor: pointer;
        }

        .logo-container img {
            height: 200px;
            filter: drop-shadow(0 0 25px var(--red));
            animation: main-float 5s infinite ease-in-out;
            transition: 0.3s;
        }

        .logo-container:hover img {
            filter: drop-shadow(0 0 40px var(--blue));
            transform: scale(1.05) skewX(-2deg);
        }

        @keyframes main-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        /* НАВИГАЦИЯ */
        nav {
            margin-top: 30px;
            display: flex;
            gap: 60px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 15px 40px;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.05), transparent);
        }

        nav a {
            text-decoration: none;
            color: #666;
            font-weight: 700;
            letter-spacing: 5px;
            font-size: 14px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        nav a.active, nav a:hover {
            color: var(--blue);
            text-shadow: 0 0 15px var(--blue);
            transform: translateY(-3px);
        }

        /* HERO SECTION */
        .content-frame {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .profile-hex {
            width: 200px;
            height: 200px;
            margin-bottom: 40px;
            position: relative;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            background: var(--blue);
            padding: 4px;
            transition: 0.5s;
        }

        .profile-hex:hover {
            transform: rotate(10deg);
            box-shadow: 0 0 50px var(--blue);
        }

        .profile-hex .inner {
            width: 100%;
            height: 100%;
            background: #000;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            overflow: hidden;
        }

        .profile-hex img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: 0.5s;
        }

        .profile-hex:hover img { opacity: 1; filter: contrast(1.2); }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #fff 50%, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px var(--red));
            letter-spacing: 10px;
        }

        .status-tag {
            color: var(--pink);
            letter-spacing: 12px;
            font-size: 12px;
            margin: 20px 0;
            font-weight: bold;
        }

        /* КОНСОЛЬНЫЙ БЛОК ЛОГОВ */
        .system-logs {
            width: 600px;
            height: 150px;
            border: 1px solid var(--border);
            margin-top: 30px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: #444;
            overflow: hidden;
            text-align: left;
            position: relative;
        }

        .system-logs::after {
            content: "SYSTEM_MONITOR";
            position: absolute;
            bottom: 5px;
            right: 10px;
            color: var(--blue);
            opacity: 0.5;
        }

        /* LOADERS & WIPES */
        #page-loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.8s;
        }

        .loader-bar {
            width: 300px;
            height: 2px;
            background: #111;
            position: relative;
            overflow: hidden;
        }

        .loader-bar::after {
            content: "";
            position: absolute;
            left: 0;
            height: 100%;
            width: 50%;
            background: var(--red);
            animation: loading 2s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        #transition-overlay {
            position: fixed;
            inset: 0;
            z-index: 30000;
            display: none;
            grid-template-columns: repeat(10, 1fr);
        }
        .grid-tile { background: var(--blue); transform: scaleY(0); transition: 0.4s; }
        #transition-overlay.active { display: grid; }
        #transition-overlay.active .grid-tile { transform: scaleY(1); }

    </style>
</head>
<body>

    <!-- HUD СЛОЙ -->
    <div class="hud-corner top-left">Connection: Secure<br>Protocol: ICDK_CORE_v4</div>
    <div class="hud-corner top-right">Uptime: <span id="clock">00:00:00</span><br>Region: MSK_NODE_07</div>
    <div class="hud-corner bottom-left">© 2026 BELOV DIGITAL INDUSTRIES. ALL RIGHTS RESERVED.</div>

    <!-- ЗАГРУЗЧИК -->
    <div id="page-loader">
        <div style="text-align: center;">
            <div style="color: var(--red); font-size: 10px; letter-spacing: 5px; margin-bottom: 15px;">BOOTING_CORE...</div>
            <div class="loader-bar"></div>
        </div>
    </div>

    <!-- ПЕРЕХОД -->
    <div id="transition-overlay">
        <!-- Генерируется через JS -->
    </div>

    <header>
        <div class="logo-container" data-aos="zoom-in">
            <img src="photos/logo.png" alt="CORE_LOGO">
        </div>
        
        <nav data-aos="fade-down" data-aos-delay="200">
            <a href="index.html" class="active">ЯДРО</a>
            <a href="projects.html">ПРОЕКТЫ</a>
            <a href="skin_changer.html">ЧЕЙНДЖЕР</a>
            <a href="contact.html">СВЯЗЬ</a>
        </nav>
    </header>

    <main class="content-frame">
        <div class="profile-hex" data-aos="flip-left" data-aos-delay="400">
            <div class="inner">
                <img src="photos/me.jpg" alt="OPERATOR">
            </div>
        </div>

        <h1 data-aos="fade-up" data-aos-delay="600">БЕЛОВ ДАНИИЛ</h1>
        <div class="status-tag" data-aos="fade-up" data-aos-delay="700">ICDK-730-LEGACY // ONLINE</div>

        <div class="system-logs" id="logs" data-aos="fade-in" data-aos-delay="900">
            <!-- Сюда JS будет дописывать логи -->
        </div>
    </main>

    <!-- СКРИПТЫ -->
    <script src="https://unpkg.com"></script>
   <script>
    // Инициализация анимаций
    AOS.init({ duration: 1200, once: true });

    // Убираем лоадер ГАРАНТИРОВАНО (через 2 секунды, даже если фото не подгрузилось)
    const hideLoader = () => {
        const loader = document.getElementById('page-loader');
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 800);
        }
    };

    window.onload = hideLoader;
    setTimeout(hideLoader, 2000); // Резервный таймер, если onload не сработал

    // ... остальной твой код (логи, часы и переходы) ...
</script>
</body>
</html>
