<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ICDK // CONTACT_LINK</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link href="https://unpkg.com" rel="stylesheet">
    <style>
        :root {
            --red: #ff3131;
            --blue: #00f2ff;
            --bg: #020205;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* ШАПКА С ЛОГОТИПОМ */
        header {
            position: fixed;
            top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }

        .logo-top img {
            height: 90px; /* Оптимально для этой страницы */
            filter: drop-shadow(0 0 15px var(--red));
            animation: logo-float 4s infinite ease-in-out;
            margin-bottom: 20px;
        }

        @keyframes logo-float {
            0%, 100% {
                transform: translateY(0);
                filter: drop-shadow(0 0 10px var(--red));
            }

            50% {
                transform: translateY(-10px);
                filter: drop-shadow(0 0 25px var(--blue));
            }
        }

        /* НАВИГАЦИЯ */
        nav {
            display: flex;
            gap: 30px;
        }

            nav a {
                text-decoration: none;
                color: #444;
                font-size: 11px;
                letter-spacing: 2px;
                text-transform: uppercase;
                transition: 0.3s;
            }

                nav a:hover, nav a.active {
                    color: var(--blue);
                    text-shadow: 0 0 10px var(--blue);
                }

        /* КОНТЕЙНЕР КОНТАКТОВ */
        .box {
            border: 1px solid var(--red);
            padding: 35px;
            background: rgba(255, 49, 49, 0.03);
            box-shadow: 0 0 30px rgba(255, 49, 49, 0.1);
            width: 350px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .qr-frame {
            margin: 0 auto 25px auto;
            border: 2px solid var(--blue);
            padding: 10px;
            background: #000;
            position: relative;
            width: 180px;
            box-shadow: 0 0 15px var(--blue);
            overflow: hidden;
        }

            .qr-frame img {
                width: 100%;
                display: block;
            }

            .qr-frame::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 2px;
                background: var(--blue);
                animation: scan_line 2.5s linear infinite;
            }

        @keyframes scan_line {
            0% {
                top: 0%;
            }

            100% {
                top: 100%;
            }
        }

        h3 {
            color: var(--red);
            margin: 0 0 15px 0;
            letter-spacing: 3px;
            font-size: 14px;
        }

        .label {
            color: var(--blue);
            font-size: 9px;
            display: block;
            letter-spacing: 2px;
            margin-top: 12px;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        a.contact-link {
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
            font-family: monospace;
            border-bottom: 1px solid #222;
        }

            a.contact-link:hover {
                color: var(--red);
                border-color: var(--red);
                text-shadow: 0 0 8px var(--red);
            }

        .back-core {
            font-size: 10px;
            color: #444;
            text-decoration: none;
            margin-top: 25px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-top">
            <img src="photos/logo.png" alt="ICDK_LOGO">
        </div>
        <nav>
            <a href="index.html">ЯДРО</a>
            <a href="projects.html">ПРОЕКТЫ</a>
            <a href="contact.html" class="active">СВЯЗЬ</a>
        </nav>
    </header>

    <div class="box" data-aos="zoom-in">
        <div class="qr-frame"><img src="photos/qr_telega.png" alt="QR"></div>
        <h3>COMM_LINK_READY</h3>

        <span class="label">Telegram Node</span>
        <a href="https://t.me" class="contact-link" target="_blank">@DENGAR_ICDK</a>

        <span class="label">Secure E-Mail</span>
        <a href="mailto:danya.belov.2007@internet.ru" class="contact-link">danya.belov.2007@internet.ru</a>

        <span class="label">Mobile Comm</span>
        <a href="tel:+79800704800" class="contact-link">+7 (980) 070-48-00</a>

        <div>
            <a href="index.html" class="back-core">[ BACK_TO_CORE ]</a>
        </div>
    </div>

    <script src="https://unpkg.com"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
