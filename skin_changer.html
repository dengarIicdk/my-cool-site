<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ICDK // SYSTEM_CONTROLLER</title>
    <style>
        @import url('https://fonts.googleapis.com');

        :root {
            --pink: #ff0055;
            --blue: #00f2ff;
            --bg: #020205;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            height: 100vh;
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .noise {
            position: fixed;
            inset: 0;
            background: url(https://media.giphy.com);
            opacity: 0.04;
            z-index: 2000;
            pointer-events: none;
        }

        .scanline {
            width: 100%;
            height: 2px;
            z-index: 2001;
            background: rgba(0, 242, 255, 0.05);
            position: fixed;
            bottom: 100%;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% {
                bottom: 100%;
            }

            100% {
                bottom: 0%;
            }
        }

        .header {
            border-bottom: 2px solid var(--pink);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
        }

            .header h1 {
                color: var(--pink);
                margin: 0;
                font-size: 1.1rem;
                text-shadow: 0 0 10px var(--pink);
                letter-spacing: 4px;
            }

        .grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            margin-top: 30px;
            padding: 0 20px;
        }

        .panel {
            background: rgba(255, 0, 85, 0.02);
            border: 1px solid var(--pink);
            padding: 30px;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.1);
            position: relative;
            backdrop-filter: blur(5px);
        }

        h3 {
            color: var(--blue);
            margin: 0 0 20px 0;
            font-size: 11px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        label {
            font-size: 9px;
            color: #555;
            text-transform: uppercase;
            margin-top: 18px;
            display: block;
            letter-spacing: 1px;
        }

        select {
            background: #000;
            border: 1px solid var(--blue);
            color: var(--blue);
            padding: 12px;
            width: 100%;
            margin-top: 5px;
            font-family: 'Orbitron';
            font-size: 10px;
            outline: none;
            transition: 0.3s;
        }

            select:hover {
                border-color: var(--pink);
                box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
            }

        /* ИНФОРМАЦИОННОЕ ТАБЛО */
        .data-display {
            background: #000;
            border: 1px solid var(--blue);
            color: var(--pink);
            padding: 20px;
            width: 100%;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 1.6rem;
            font-weight: 900;
            text-align: center;
            letter-spacing: 6px;
            position: relative;
            text-shadow: 0 0 15px var(--pink);
            box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.1);
        }

            .data-display::before {
                content: "PACKET_ID";
                position: absolute;
                top: -8px;
                left: 15px;
                background: var(--bg);
                font-size: 8px;
                padding: 0 8px;
                color: var(--blue);
                border: 1px solid var(--blue);
            }

        .btn-inject {
            background: var(--pink);
            color: #fff;
            border: none;
            padding: 20px;
            width: 100%;
            cursor: pointer;
            font-weight: 900;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: 0.3s;
            box-shadow: 0 0 20px var(--pink);
            position: relative;
            overflow: hidden;
        }

            .btn-inject:hover {
                background: #fff;
                color: var(--pink);
                box-shadow: 0 0 40px var(--pink);
                transform: translateY(-2px);
            }

            .btn-inject:active {
                transform: translateY(1px);
            }

        .terminal {
            background: rgba(0,0,0,0.95);
            border: 1px solid #1a1a1a;
            padding: 25px;
            font-family: monospace;
            font-size: 11px;
            height: 400px;
            color: #444;
            overflow-y: auto;
            box-shadow: inset 0 0 30px #000;
        }

        .blue {
            color: var(--blue);
            text-shadow: 0 0 5px var(--blue);
        }

        .pink {
            color: var(--pink);
            text-shadow: 0 0 5px var(--pink);
        }
    </style>
</head>
<body>
    <nav>
    <a href="index.html">Главная</a> |
    <a href="projects.html">Проекты</a> |
    <a href="skin_changer.html">Скин Чейнджер</a> |
    <a href="contact.html">Контакты</a>
</nav>
<hr>
    <div class="noise"></div>
    <div class="scanline"></div>

    <div class="header">
        <h1>ICDK // DIRECT_LINK_INTERFACE</h1>
        <a href="projects.html" style="color:var(--blue); text-decoration:none; border:1px solid var(--blue); padding:8px 25px; font-size: 10px; letter-spacing: 2px;">DISCONNECT</a>
    </div>

    <div class="grid">
        <div class="panel">
            <h3>HARDWARE_INJECTION</h3>

            <label>MODEL_DEFINITION</label>
            <select id="knife-id">
                <option value="507">Karambit // 507</option>
                <option value="515">Butterfly // 515</option>
                <option value="508">M9_Bayonet // 508</option>
                <option value="526">Kukri // 526</option>
                <option value="500">Bayonet // 500</option>
            </select>

            <label>PAINT_KIT_ID</label>
            <select id="skin-id">
                <option value="0x192">Fade // Gradient</option>
                <option value="0x1B2C">Gamma Doppler // Emerald</option>
                <option value="0x231">Lore // Dragon</option>
                <option value="0x1F4">Autotronic // Red</option>
                <option value="0x13B">Asiimov // Sci-Fi</option>
            </select>

            <label>STREAM_COMMAND_PREVIEW</label>
            <div class="data-display" id="data-preview">507:0x192</div>

            <button class="btn-inject" id="send-cmd">EXECUTE_RECONSTRUCTION</button>
        </div>

        <div class="terminal" id="logger">
            <div style="color:#666;">[ SYSTEM_BOOT ] Bridge mode enabled.</div>
            <div>[<span class="blue">READY</span>] Waiting for operator command...</div>
        </div>
    </div>

    <script>
        const knifeSelect = document.getElementById('knife-id');
        const skinSelect = document.getElementById('skin-id');
        const display = document.getElementById('data-preview');
        const logger = document.getElementById('logger');

        function refreshPreview() {
        display.innerText = `${knifeSelect.value}:${skinSelect.value}`;
        }

        knifeSelect.onchange = refreshPreview;
        skinSelect.onchange = refreshPreview;

        document.getElementById('send-cmd').onclick = () => {
        const command = display.innerText;

        // Прямая передача через буфер обмена в Лоадер
        navigator.clipboard.writeText(command).then(() => {
        addLog(`<span class="pink">STREAMING: [${command}] sent to Loader bridge.</span>`);
        addLog(`[<span class="blue">SYSTEM</span>] skin_config.txt updated successfully.`);

        // Эффект нажатия
        display.style.color = "#00f2ff";
        setTimeout(() => { display.style.color = "#ff0055"; }, 200);
        });
        };

        function addLog(text) {
        const div = document.createElement('div');
        div.innerHTML = `[<span class="blue">${new Date().toLocaleTimeString()}</span>] ${text}`;
        logger.appendChild(div);
        logger.scrollTop = logger.scrollHeight;
        }
    </script>
</body>
</html>
