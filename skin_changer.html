<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ICDK // DIRECT_LINK_INTERFACE</title>
    <style>
        :root {
            --red: #ff3131;
            --blue: #00f2ff;
            --bg: #020205;
            --dark-red: #440000;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Навигация сверху */
        .top-nav {
            background: #000;
            border-bottom: 1px solid var(--red);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-links a {
            color: #444;
            text-decoration: none;
            font-size: 11px;
            margin-right: 20px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--blue);
        }

        .header-title {
            color: var(--red);
            font-weight: bold;
            letter-spacing: 3px;
            font-size: 14px;
        }
        /* Главная рабочая область */
        .main-interface {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }

        /* Левая панель - Инъекция */
        .side-panel {
            width: 350px;
            border: 1px solid var(--dark-red);
            padding: 20px;
            background: rgba(255, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            color: var(--blue);
            font-size: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--dark-red);
            padding-bottom: 10px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .label {
            color: #555;
            font-size: 9px;
            display: block;
            margin-bottom: 5px;
        }

        select {
            width: 100%;
            background: #050505;
            border: 1px solid var(--blue);
            color: #fff;
            padding: 8px;
            font-family: monospace;
            outline: none;
        }

        .id-display {
            border: 1px solid var(--blue);
            padding: 15px;
            text-align: center;
            margin-top: 10px;
            position: relative;
        }

        .id-display::before {
            content: "PACKET_ID";
            position: absolute;
            top: -7px;
            left: 10px;
            background: var(--bg);
            padding: 0 5px;
            font-size: 8px;
            color: var(--blue);
        }

        .id-value {
            color: var(--red);
            font-size: 24px;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--red);
        }

        .btn-execute {
            margin-top: auto;
            background: var(--red);
            border: none;
            color: #fff;
            padding: 15px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-execute:hover {
            box-shadow: 0 0 20px var(--red);
            background: #ff4d4d;
        }

        /* Правая панель - Консоль */
        .console-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #111;
            padding: 20px;
            font-size: 11px;
            color: #444;
            overflow-y: auto;
            line-height: 1.6;
        }

        .console-line span.system { color: #666; }
        .console-line span.ready { color: var(--blue); }
        .console-line span.success { color: var(--red); }

        /* Лоадер */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }
        .bar { flex: 1; background: var(--red); transform: scaleX(0); transition: 0.4s; }
        #loader.active .bar { transform: scaleX(1); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="projects.html">Проекты</a>
            <a href="skin_changer.html" class="active">Скин Чейнджер</a>
            <a href="contact.html">Контакты</a>
        </div>
        <div class="header-title">ICDK // DIRECT_LINK_INTERFACE</div>
        <button class="btn-disconnect">DISCONNECT</button>
    </nav>

    <div id="loader"><div class="bar"></div></div>

    <div class="main-interface">
        <!-- Левая часть: Управление -->
        <div class="side-panel">
            <div class="panel-title">HARDWARE_INJECTION</div>
            
            <div class="control-group">
                <span class="label">MODEL_DEFINITION</span>
                <select id="weapon" onchange="updateId()">
                    <option value="7" data-hex="0x192">Karambit | 007</option>
                    <option value="9" data-hex="0x1F4">AWP | 009</option>
                    <option value="4" data-hex="0x0A2">Glock-18 | 004</option>
                </select>
            </div>

            <div class="control-group">
                <span class="label">PAINT_KIT_ID</span>
                <select id="skin" onchange="updateId()">
                    <option value="433">Fade / Gradient</option>
                    <option value="344">Dragon Lore</option>
                    <option value="504">Kill Confirmed</option>
                </select>
            </div>

            <div class="control-group">
                <span class="label">STREAM_COMMAND_ID</span>
                <div class="id-display">
                    <div class="id-value" id="packet-id">507:0x192</div>
                </div>
            </div>

            <button class="btn-execute" onclick="runExecution()">EXECUTE_RECONSTRUCTION</button>
        </div>

        <!-- Правая часть: Логи -->
        <div class="console-panel" id="console">
            <div class="console-line"><span class="system">[ SYSTEM_BOOT ]</span> Bridge mode enabled...</div>
            <div class="console-line"><span class="ready">READY</span> waiting for operator command...</div>
        </div>
    </div>

    <script>
        // Лоадер
        window.onload = () => {
            setTimeout(() => document.getElementById('loader').style.opacity = '0', 300);
        };

        // Обновление ID в боксе
        function updateId() {
            const weapon = document.getElementById('weapon');
            const skin = document.getElementById('skin').value;
            const hex = weapon.options[weapon.selectedIndex].getAttribute('data-hex');
            document.getElementById('packet-id').innerText = `${skin}:${hex}`;
        }

        // Симуляция работы
        function runExecution() {
            const consoleBox = document.getElementById('console');
            const weaponName = document.getElementById('weapon').options[weapon.selectedIndex].text;
            
            const lines = [
                `> INITIATING MEMORY_HOOK FOR ${weaponName}...`,
                `> SEARCHING FOR OFFSET dwEntityList...`,
                `> [SUCCESS] CLIENT_BASE FOUND AT 0x${Math.floor(Math.random()*16777215).toString(16).toUpperCase()}`,
                `<span class="success">> APPLYING PAINT_KIT DATA... DONE.</span>`,
                `> FORCING VIEWMODEL UPDATE...`
            ];

            lines.forEach((text, i) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'console-line';
                    div.innerHTML = text;
                    consoleBox.appendChild(div);
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                }, i * 400);
            });
        }

        // Переходы между вкладками
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.onclick = (e) => {
                const href = link.getAttribute('href');
                if (href && !href.includes('skin_changer')) {
                    e.preventDefault();
                    const l = document.getElementById('loader');
                    l.style.opacity = '1'; l.classList.add('active');
                    setTimeout(() => location.href = href, 500);
                }
            }
        });
    </script>
</body>
</html>
