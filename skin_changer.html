<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ICDK // DIRECT_LINK_INTERFACE</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --red: #ff3131;
            --blue: #00f2ff;
            --bg: #020205;
            --dark-red: #220000;
        }
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Orbitron', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }
        #transition-layer {
            position: fixed;
            inset: 0;
            background: var(--blue);
            z-index: 10000;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.8, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            mix-blend-mode: exclusion;
        }
        #transition-layer.active { transform: translateY(0); }
        .top-nav {
            background: #000;
            border-bottom: 1px solid var(--red);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 49, 49, 0.2);
        }

        .nav-links a {
            color: #444;
            text-decoration: none;
            font-size: 11px;
            margin-right: 25px;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { 
            color: var(--blue); 
            text-shadow: 0 0 10px var(--blue); 
        }

        .header-logo { display: flex; align-items: center; gap: 15px; }
        .header-logo img { 
            height: 45px; 
            filter: drop-shadow(0 0 10px var(--red));
            animation: pulse-red 2s infinite alternate;
        }
        .main-interface { display: flex; flex: 1; padding: 25px; gap: 25px; background: radial-gradient(circle at center, #050510 0%, #020205 100%); }
        .side-panel {
            width: 380px;
            border: 1px solid var(--dark-red);
            padding: 30px;
            background: rgba(255, 0, 0, 0.01);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.05);
        }

        .panel-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--dark-red);
            padding-bottom: 15px;
        }
        .panel-header img { height: 35px; margin-right: 15px; filter: drop-shadow(0 0 8px var(--blue)); animation: pulse-blue 3s infinite alternate; }

        .label { color: #555; font-size: 10px; display: block; margin-bottom: 10px; letter-spacing: 1px; }
        
        select { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--dark-red); 
            color: #fff; 
            padding: 12px; 
            font-family: 'Orbitron'; 
            outline: none; 
            margin-bottom: 25px; 
            transition: 0.3s;
        }
        select:focus { border-color: var(--blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .id-display { 
            border: 1px solid var(--blue); 
            padding: 20px; 
            text-align: center; 
            position: relative;
            background: rgba(0, 242, 255, 0.02);
        }
        .id-value { color: var(--red); font-size: 28px; letter-spacing: 8px; text-shadow: 0 0 15px var(--red); }
        .btn-execute { 
            margin-top: auto; 
            background: var(--red); 
            border: none; 
            color: #fff; 
            padding: 20px; 
            font-family: 'Orbitron'; 
            font-weight: 900; 
            cursor: pointer; 
            letter-spacing: 4px; 
            transition: 0.2s;
        }
        .btn-execute:hover { 
            background: #ff4d4d; 
            box-shadow: 0 0 30px var(--red);
            animation: glitch 0.2s infinite;
        }
        .console-panel { 
            flex: 1; 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid #111; 
            padding: 25px; 
            font-size: 12px; 
            color: #444; 
            overflow-y: auto; 
            line-height: 1.8; 
            font-family: monospace;
            box-shadow: inset 0 0 50px #000;
        }
        @keyframes pulse-red { from { filter: drop-shadow(0 0 5px var(--red)); } to { filter: drop-shadow(0 0 15px var(--red)); transform: scale(1.05); } }
        @keyframes pulse-blue { from { opacity: 0.6; } to { opacity: 1; transform: scale(1.1); } }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }

    </style>
</head>
<body>

    <div id="transition-layer"></div>

    <nav class="top-nav">
        <div class="nav-links">
            <a href="index.html">ЯДРО</a>
            <a href="projects.html">ПРОЕКТЫ</a>
            <a href="skin_changer.html" class="active">ЧЕЙНДЖЕР</a>
            <a href="contact.html">СВЯЗЬ</a>
        </div>
        <div class="header-logo">
            <span style="font-size: 10px; color: var(--blue); letter-spacing: 3px;">ICDK_LINK_v2.0</span>
            <img src="photos/logo.png" alt="ICDK">
        </div>
    </nav>

    <div class="main-interface">
        <div class="side-panel">
            <div class="panel-header">
                <img src="photos/logo.png" alt="LOGO">
                <div class="panel-title" style="color: var(--blue); letter-spacing: 2px;">MODULE: SKIN_INJECTOR</div>
            </div>
            
            <span class="label">TARGET_MODEL</span>
            <select id="weapon" onchange="updateId()">
                <option value="7" data-hex="0x192">Karambit | 007</option>
                <option value="9" data-hex="0x1F4">AWP | 009</option>
            </select>

            <span class="label">PAINT_KIT_ID</span>
            <select id="skin" onchange="updateId()">
                <option value="433">Fade / Gradient</option>
                <option value="344">Dragon Lore</option>
            </select>

            <span class="label">MEMORY_STREAM_ID</span>
            <div class="id-display"><div class="id-value" id="packet-id">433:0x192</div></div>

            <button class="btn-execute" onclick="runExecution()">EXECUTE RECONSTRUCTION</button>
        </div>

        <div class="console-panel" id="console">
            <div style="color: #666;">[ SYSTEM_BOOT ] Bridge mode enabled...</div>
            <div style="color: var(--blue);">[ STATUS ] Socket established. Waiting for command...</div>
        </div>
    </div>

    <script>
        function updateId() {
            const weapon = document.getElementById('weapon');
            const skin = document.getElementById('skin').value;
            const hex = weapon.options[weapon.selectedIndex].getAttribute('data-hex');
            document.getElementById('packet-id').innerText = `${skin}:${hex}`;
        }

        function runExecution() {
            const consoleBox = document.getElementById('console');
            const logs = [
                "> Инициализация дескриптора процесса...",
                "> Поиск сигнатуры dwEntityList...",
                "> [УСПЕХ] Область памяти найдена.",
                "> <span style='color: var(--red)'>ЗАПИСЬ ПАКЕТА В СТЕК... ВЫПОЛНЕНО.</span>",
                "> Принудительное обновление ViewModel..."
            ];
            
            logs.forEach((text, i) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.innerHTML = text;
                    consoleBox.appendChild(div);
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                }, i * 300);
            });
        }
        document.querySelectorAll('a').forEach(link => {
            link.onclick = (e) => {
                const href = link.getAttribute('href');
                if (href && href.includes('.html') && !link.classList.contains('active')) {
                    e.preventDefault();
                    document.getElementById('transition-layer').classList.add('active');
                    setTimeout(() => { window.location.href = href; }, 600);
                }
            };
        });
    </script>
</body>
</html>
